[build]
  command = "npm run build"
  publish = "dist"

# Redirect all backend /api/* routes to Netlify Serverless Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA client-side fallback redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers & Caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

